# 规则引擎配置示例
# 将此配置添加到 application.yml 中

letool:
  rule:
    # 是否启用规则引擎
    enabled: true
    # 是否启用缓存
    cache-enabled: true
    # 是否启用Web接口
    web-enabled: true
    # 并行执行线程数
    parallel-threads: 4
    # 批量执行默认批次大小
    default-batch-size: 1000
    # 数据库筛选配置
    database-validation:
      enabled: false
      default-datasource: dwd
      base-info-query-key: patient_base_info
      batch-size: 1000

# 如果需要使用数据库存储字典数据，可以配置数据源
# spring:
#   datasource:
#     url: jdbc:mysql://localhost:3306/rule_engine
#     username: root
#     password: password
#     driver-class-name: com.mysql.cj.jdbc.Driver
